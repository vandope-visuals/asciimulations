<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCIImulations</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='2.5' width='14' height='11' rx='1.5' fill='none' stroke='%2333ff66' stroke-width='1.5'/><path d='M4 6.5l2.5 1.8L4 10' fill='none' stroke='%2333ff66' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/><line x1='8' y1='10.2' x2='11.5' y2='10.2' stroke='%2333ff66' stroke-width='1.5' stroke-linecap='round'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&family=Departure+Mono&display=swap');

/* ========================================================================
   HYBRID SYSTEM: m-or.ph 1-bit Mac chrome  +  phosphor terminal sims.
   Structure (dither, stripes, 2px borders, pixel type, hard edges) is constant.
   Only --ink / --paper / glow swap per theme. 4 themes: green/white/orange/paper
   ======================================================================== */
:root,
:root[data-theme="green"] {
  --ink:#33ff66; --paper:#07120b; --bord:rgba(51,255,102,0.45); --dim:#1f7a3d;
  --glow:rgba(51,255,102,0.35); --glowsoft:rgba(51,255,102,0.10);
  --simbg:#07120b; --simglow:0 0 4px var(--glow);
}
:root[data-theme="white"] {
  --ink:#e8e8e8; --paper:#0b0b0c; --bord:rgba(232,232,232,0.45); --dim:#6a6a6a;
  --glow:rgba(255,255,255,0.30); --glowsoft:rgba(255,255,255,0.08);
  --simbg:#0b0b0c; --simglow:0 0 4px var(--glow);
}
:root[data-theme="orange"] {
  --ink:#ff9a3c; --paper:#140a03; --bord:rgba(255,154,60,0.45); --dim:#9c4f12;
  --glow:rgba(255,154,60,0.35); --glowsoft:rgba(255,154,60,0.10);
  --simbg:#140a03; --simglow:0 0 4px var(--glow);
}
:root[data-theme="paper"] {
  --ink:#000; --paper:#fff; --bord:rgba(0,0,0,0.45); --dim:#777;
  --glow:transparent; --glowsoft:rgba(0,0,0,0.06);
  --simbg:#fff; --simglow:none;
}
:root{
  /* dither + stripe fills are drawn in --ink via currentColor-ish masks.
     We bake two variants and switch with the theme by recoloring via filter. */
  --chrome:'Silkscreen','Departure Mono',monospace;
  --body:'Departure Mono','VT323',monospace;
  --mono:'Departure Mono','VT323',monospace;
  --font:'Departure Mono','VT323','Menlo',monospace;
  --font-size:13px; --line-h:14px; --bw:1px;
}

/* Dither/stripe patterns built from the ink color via a tiny inline mask trick:
   we use background layers tinted with --ink through color-mix where supported,
   falling back to opacity. Implemented as pseudo-element overlays per surface. */
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{
  width:100%; min-height:100%;
  background:var(--paper); color:var(--ink);
  font-family:var(--body); font-size:var(--font-size);
  -webkit-font-smoothing:none; font-smooth:never; image-rendering:pixelated;
  user-select:none; -webkit-user-select:none;
}

/* dither helper: 1px ink dot on 5px grid; stripe helper: 1px ink line on 2px.
   Tinted by ink using a masked pseudo so it follows the theme color. */
.dither{ position:relative; }
.dither::before{
  content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
  background-color:var(--ink); opacity:0.10;
  -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='5' height='5' shape-rendering='crispEdges'><rect x='1' y='1' width='1' height='1' fill='black'/></svg>") repeat;
  mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='5' height='5' shape-rendering='crispEdges'><rect x='1' y='1' width='1' height='1' fill='black'/></svg>") repeat;
}
.dither > *{ position:relative; z-index:1; }

/* striped title bar */
.titlebar{
  position:relative; border-bottom:var(--bw) solid var(--bord);
  background:var(--paper); display:flex; align-items:center;
  min-height:24px;
}
.titlebar::before{
  content:""; position:absolute; inset:0; pointer-events:none;
  background-color:var(--ink); opacity:0.45;
  -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='2' height='2' shape-rendering='crispEdges'><rect width='2' height='1' fill='black'/></svg>") repeat;
  mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='2' height='2' shape-rendering='crispEdges'><rect width='2' height='1' fill='black'/></svg>") repeat;
}
.titlebar > *{ position:relative; z-index:1; }

/* TOPBAR (System 7 menu strip) */
.topbar{ padding:0 8px; gap:8px; z-index:5; }
.topbar .winsquare{ width:14px; height:14px; background:var(--paper); border:var(--bw) solid var(--bord); flex:none; }
.brand{
  font-family:var(--chrome); font-size:11px; letter-spacing:0.12em; color:var(--ink);
  background:var(--paper); padding:3px 9px; border:var(--bw) solid var(--bord); text-transform:uppercase;
}
.sdot{ width:8px; height:8px; background:var(--ink); animation:blink 1.4s steps(2,end) infinite; flex:none; }
@keyframes blink{ 50%{opacity:0;} }
.spacer{ flex:1; }

/* HARDWARE BUTTONS — blocky, invert on hover */
.themes{ display:flex; gap:8px; }
.themes button{
  font-family:var(--chrome); font-size:9px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
  color:var(--ink); background:var(--paper); border:var(--bw) solid var(--bord); border-radius:0;
  padding:3px 8px; cursor:pointer; min-height:22px; line-height:1.1;
}
.themes button:hover{ background:var(--ink); color:var(--paper); }
.themes button.active{ background:var(--ink); color:var(--paper); }
.themes button:focus-visible{ outline:2px solid var(--ink); outline-offset:2px; }

/* LANDING */
.landing-head{ text-align:center; padding:24px 16px 10px; }
.landing-head h1{ font-family:var(--chrome); font-size:clamp(18px,5.2vw,29px); letter-spacing:0.14em; font-weight:700; text-transform:uppercase; line-height:1.1; white-space:nowrap; }
.landing-head h1 .hl-ascii{ font-size:1.2em; }
.landing-head h1 .hl-mul{ opacity:0.8; }
.landing-head p{ font-family:var(--mono); margin-top:10px; opacity:0.7; font-size:13px; letter-spacing:0.04em; text-transform:lowercase; }
.landing-head p .hl100{ opacity:1; font-weight:700; color:var(--hud,var(--ink)); }
.grid100{ display:grid; grid-template-columns:repeat(10,1fr); gap:6px; max-width:1340px; margin:20px auto 40px; padding:0 16px; }
.tile{
  aspect-ratio:1/1; border:var(--bw) solid var(--bord); background:var(--paper);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  position:relative; overflow:hidden;
}
.tile:hover{ background:var(--ink); }
.tile:hover pre{ filter:invert(1); }
.tile:focus-visible{ outline:2px solid var(--ink); outline-offset:1px; }
.tile.empty{ cursor:default; }
.tile.empty::after{
  content:""; position:absolute; inset:0; background-color:var(--ink); opacity:0.10;
  -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='7' height='7' shape-rendering='crispEdges'><rect x='1' y='1' width='1' height='1' fill='black'/></svg>") repeat;
  mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='7' height='7' shape-rendering='crispEdges'><rect x='1' y='1' width='1' height='1' fill='black'/></svg>") repeat;
}
.tile.empty:hover{ background:var(--paper); }
.tile pre{ margin:0; font-size:calc(9px*0.82); line-height:1; --fs-line:9px; --cw:9px; white-space:pre; color:var(--ink); text-shadow:var(--simglow); pointer-events:none; }
.tile pre .gr{ display:grid; height:9px; }
.tile pre .gr > i{ display:flex; align-items:center; justify-content:center; overflow:hidden; font-style:normal; width:9px; height:9px; line-height:1; }
.tile pre .gr > i.h{ color:var(--hud); }
.tile pre .gr > i.d{ color:var(--dim); }
.tile pre .gr > i[style*="--ga"]{ text-shadow:0 0 4px color-mix(in srgb, var(--glow) calc(var(--ga,1) * 100%), transparent); }
.tile .num{ position:absolute; top:3px; left:4px; font-family:var(--chrome); font-size:9px; opacity:0.6; z-index:2; }
.tile .lbl{
  position:absolute; bottom:0; left:0; right:0; font-family:var(--chrome); font-size:8px;
  text-align:center; padding:3px 0; background:var(--ink); color:var(--paper);
  opacity:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:uppercase; z-index:2;
}
.tile:hover .lbl{ opacity:1; }

.pager{ display:flex; justify-content:center; align-items:center; gap:10px; margin:0 auto 56px; }
.pager .pdot{ width:0; height:0; padding:0; border:none; background:none; cursor:pointer; font-family:var(--mono); font-size:16px; line-height:1; color:var(--dim); opacity:0.6; transition:opacity .12s,color .12s; width:auto; height:auto; }
.pager .pdot::before{ content:"\25cb"; }
.pager .pdot.active::before{ content:"\25cf"; }
.pager .pdot.active{ color:var(--ink); opacity:1; }
.pager .pdot:hover{ color:var(--ink); opacity:1; }
.pager .pdot:focus-visible{ outline:2px solid var(--ink); outline-offset:3px; }
.pager .parrow{ background:none; border:none; cursor:pointer; font-family:var(--chrome); font-size:11px; color:var(--dim); opacity:0.6; padding:4px 6px; transition:opacity .12s,color .12s; }
.pager .parrow:hover{ color:var(--ink); opacity:1; }
.pager .parrow:disabled{ opacity:0.2; cursor:default; }

/* INNER */
#inner{ display:none; }
#inner.show{ display:block; }
body.inner-open{ overflow:hidden; height:100vh; height:100dvh; }
.inner-wrap{ max-width:1400px; margin:0 auto; padding:18px 16px 20px; }
.stage{ border:var(--bw) solid var(--bord); background:var(--simbg); display:flex; justify-content:center; align-items:flex-start; padding:14px; overflow:hidden; }
.inner-head{ border:var(--bw) solid var(--bord); border-bottom:none; padding:0 10px; gap:12px; min-height:46px; }
.inner-head .ico{
  width:32px; height:32px; flex:none; border:var(--bw) solid var(--bord); background:var(--paper);
  display:flex; align-items:center; justify-content:center;
  font-size:6px; line-height:6px; white-space:pre; overflow:hidden; color:var(--ink); text-shadow:var(--simglow);
}
.inner-head .meta{ flex:1; }
.inner-head .name{ font-family:var(--chrome); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; }
.inner-head .cat{ font-family:var(--mono); font-size:12px; opacity:0.65; letter-spacing:0.04em; text-transform:lowercase; }
.iconbtn{
  font-family:var(--chrome); font-size:9px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
  color:var(--ink); background:var(--paper); border:var(--bw) solid var(--bord); border-radius:0;
  padding:5px 9px; cursor:pointer; min-height:24px; line-height:1.1;
}
.iconbtn:hover{ background:var(--ink); color:var(--paper); }
.iconbtn:focus-visible{ outline:2px solid var(--ink); outline-offset:2px; }
.iconbtn:disabled{ color:var(--dim); border-color:var(--bord); opacity:0.4; cursor:default; }
.iconbtn:disabled:hover{ background:var(--paper); color:var(--dim); }
.homeico{ font-size:1.2em; vertical-align:-0.08em; }
.nav-row{ display:flex; gap:12px; align-items:center; }

.grid{ margin:0; font-family:var(--mono); --cw:var(--fs-line,14px); font-size:calc(var(--cw)*0.82); line-height:1; color:var(--ink); text-shadow:var(--simglow); display:block; }
.grid .gr{ display:grid; height:var(--cw); }
.grid .gr > i{ display:flex; align-items:center; justify-content:center; overflow:hidden; font-style:normal; width:var(--cw); height:var(--cw); line-height:1; }
.grid .gr > i.h{ color:var(--hud); }
.grid .gr > i.d{ color:var(--dim); }
.grid .gr > i[style*="--ga"]{ text-shadow:0 0 4px color-mix(in srgb, var(--glow) calc(var(--ga,1) * 100%), transparent); }
.grid .hud{ opacity:0.85; text-transform:uppercase; }

.controls{ border:var(--bw) solid var(--bord); border-top:none; padding:14px 16px; display:grid; grid-template-columns:1.2fr 1fr 1fr 1fr; gap:20px; align-items:start; }
.ctrl-group{ display:flex; flex-direction:column; gap:8px; min-width:0; }
.ctrl-group .glabel, .ctrl-col .glabel{ font-family:var(--chrome); font-size:8px; font-weight:700; letter-spacing:0.06em; opacity:0.7; text-transform:uppercase; }
.ctrl-col{ display:flex; flex-direction:column; gap:8px; min-width:0; }
.charset-modes{ display:flex; gap:8px; width:100%; }
.charset-modes button{
  flex:1; text-align:center;
  font-family:var(--chrome); font-size:9px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
  background:var(--paper); border:var(--bw) solid var(--bord); color:var(--ink); padding:4px 8px; cursor:pointer; min-height:24px;
}
.charset-modes button:hover{ background:var(--ink); color:var(--paper); }
.charset-modes button.active{ background:var(--ink); color:var(--paper); }
.charset-modes button:focus-visible{ outline:2px solid var(--ink); outline-offset:2px; }

/* square slider — black track, white block thumb, ew-resize */
.slider-row{ display:flex; flex-direction:column; gap:4px; font-size:13px; font-family:var(--mono); }
.slider-row .srow-top{ display:flex; justify-content:space-between; align-items:center; }
.slider-row label{ font-family:var(--chrome); font-size:8px; letter-spacing:0.04em; text-transform:uppercase; opacity:0.8; }
.slider-row .srow-bot{ display:flex; align-items:center; gap:8px; }
.slider-row input[type=range]{
  -webkit-appearance:none; appearance:none; flex:1; height:22px; background:transparent; outline:none; cursor:ew-resize;
}
.slider-row input[type=range]::-webkit-slider-runnable-track{ height:10px; background:var(--ink); border:var(--bw) solid var(--bord); }
.slider-row input[type=range]::-moz-range-track{ height:10px; background:var(--ink); border:var(--bw) solid var(--bord); }
.slider-row input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:14px; height:20px; margin-top:-7px; background:var(--paper); border:var(--bw) solid var(--bord); border-radius:0; cursor:ew-resize; }
.slider-row input[type=range]::-moz-range-thumb{ width:14px; height:20px; background:var(--paper); border:var(--bw) solid var(--bord); border-radius:0; }
.slider-row .val{ width:46px; text-align:center; background:var(--paper); border:var(--bw) solid var(--bord); padding:0 4px; font-size:13px; text-transform:lowercase; }

/* fullscreen — pure sim, no chrome */
#inner.fs .inner-head, #inner.fs .controls{ display:none; }
#inner.fs .inner-wrap{ max-width:none; padding:0; margin:0; }
#inner.fs .stage{ position:fixed; inset:0; z-index:150; border:none; padding:0; display:block; background:var(--simbg); overflow:hidden; }
#inner.fs .grid{ --cw:var(--fs-line,14px); font-size:calc(var(--cw)*0.82); line-height:1; display:block; }
.fs-exit{ display:none; position:fixed; top:14px; right:16px; z-index:160; opacity:0.5; }
.fs-exit:hover{ opacity:1; }
#inner.fs .fs-exit{ display:block; }

@media (max-width:640px){
  .grid100{ grid-template-columns:repeat(5,1fr); }

  /* landing: surface the pager above the grid so paging needs no scroll.
     Force children to stretch full width so tile sizing matches block flow. */
  #landing{ display:flex; flex-direction:column; align-items:stretch; padding-bottom:52px; }
  #landing .landing-head{ order:0; }
  #landing .pager{ order:1; margin:4px auto 16px; }
  #landing .grid100{ order:2; width:100%; margin:0 auto 40px; padding:0 16px; }

  /* top theme bar: on mobile the top strip keeps only the brand;
     the theme toggles become a fixed footer pinned to the visible viewport bottom */
  .topbar{ padding:5px 8px; }
  .brand{ font-size:9px; letter-spacing:0.08em; padding:3px 7px; }
  .topbar .spacer{ flex:1; }
  .themes{
    position:fixed; left:0; right:0; bottom:0; z-index:120;
    display:flex; gap:6px; justify-content:space-between;
    padding:6px 8px calc(6px + env(safe-area-inset-bottom));
    background:var(--paper); border-top:var(--bw) solid var(--bord);
  }
  .themes button{ flex:1; padding:7px 4px; }
  /* reserve room so fixed footer never covers page content */
  .inner-wrap{ padding-bottom:calc(52px + env(safe-area-inset-bottom)); }
  /* footer hidden in fullscreen (pure sim) */
  #inner.fs .themes{ display:none; }

  /* inner header: icon + name on top, nav buttons as an even icon-only row below */
  .inner-head{ flex-wrap:wrap; padding:6px 8px; row-gap:6px; min-height:0; }
  .inner-head .ico{ width:28px; height:28px; }
  .inner-head .meta{ flex:1 1 auto; min-width:0; }
  .inner-head .name{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .inner-head .iconbtn{ flex:1 1 0; min-width:0; text-align:center; padding:8px 4px; }
  .inner-head .iconbtn .btn-label{ display:none; }   /* icon-only on mobile */
  .inner-head .iconbtn .homeico{ font-size:1.3em; }
  .nav-row{ display:flex; gap:6px; flex:1 1 100%; }

  /* control strip: 2 columns => 2x2 (characters | zoom / tune1 | tune2) */
  .controls{ grid-template-columns:1fr 1fr; gap:14px 16px; padding:12px; }
  .charset-modes{ gap:4px; }
  .charset-modes button{ min-width:0; padding:4px 2px; letter-spacing:0; }
}
</style>
</head>
<body>
<div class="topbar titlebar">
  <span class="winsquare"></span>
  <span class="brand">VANDOPE_VISUALS</span>
  <span class="sdot"></span>
  <span class="spacer"></span>
  <div class="themes" id="themes">
    <button data-t="green"  class="active">green</button>
    <button data-t="white">white</button>
    <button data-t="orange">amber</button>
    <button data-t="paper">paper</button>
  </div>
</div>

<section id="landing" class="dither">
  <div class="landing-head">
    <h1><span class="hl-ascii">ASCII</span><span class="hl-mul">MULATIONS</span></h1>
    <p>a gallery of <span class="hl100">100</span> living character-grid simulations</p>
  </div>
  <div class="grid100" id="grid100"></div>
  <div class="pager" id="pager"></div>
</section>

<section id="inner">
  <div class="inner-wrap">
    <div class="inner-head titlebar">
      <div class="ico" id="innerIco"></div>
      <div class="meta">
        <div class="name" id="innerName">&mdash;</div>
        <div class="cat" id="innerCat">&mdash;</div>
      </div>
      <div class="nav-row">
      <button class="iconbtn" id="backBtn" title="all simulations" aria-label="home"><span class="homeico">&#8962;</span> <span class="btn-label">home</span></button>
      <button class="iconbtn" id="prevBtn" title="previous sim" aria-label="previous sim">&#9665; <span class="btn-label">prev</span></button>
      <button class="iconbtn" id="randBtn" title="random sim" aria-label="random sim">&#10042; <span class="btn-label">random</span></button>
      <button class="iconbtn" id="nextBtn" title="next sim" aria-label="next sim"><span class="btn-label">next</span> &#9655;</button>
      <button class="iconbtn" id="fsBtn" title="fullscreen" aria-label="fullscreen">&#9974; <span class="btn-label">fullscreen</span></button>
      </div>
    </div>
    <div class="stage"><pre class="grid" id="grid" tabindex="0"></pre></div>
    <div class="controls dither">
      <div class="ctrl-col">
        <span class="glabel">characters</span>
        <div class="charset-modes" id="charsetModes">
          <button data-m="ascii" class="active">ascii</button>
          <button data-m="dots">dots</button>
          <button data-m="blocky">blocks</button>
        </div>
      </div>
      <div class="ctrl-col" id="tuneCol1"></div>
      <div class="ctrl-col" id="tuneCol2"></div>
      <div class="ctrl-col" id="zoomCol"></div>
    </div>
  </div>
  <button class="iconbtn fs-exit" id="fsExit">&#10005; exit</button>
</section>

<script>
const COLS=100, ROWS=44, TAU=Math.PI*2;
const clamp=(v,lo,hi)=>v<lo?lo:v>hi?hi:v;
const CHARSETS={ blocky:' \u2591\u2592\u2593\u2588', ascii:' .,-~:;=!*#$@', dots:' .\u00b7\u2218\u2022\u25cf\u2b24' };
// Sub-step opacity: dots(7) and blocks(5) have few glyph levels, so we smooth
// the gradient by fading each glyph toward the next using the fractional part
// of t*rampLength. ASCII(12) is already smooth and is left at full opacity.
// shadeChar stashes the fraction in _subFrac; Grid.set() consumes it per cell.
let _subFrac=1, _subTok=0;
function shadeChar(ramp,t){ const f=clamp(t,0,1)*ramp.length; const i=clamp(Math.floor(f),0,ramp.length-1);
  if(ramp===CHARSETS.dots||ramp===CHARSETS.blocky){ const frac=f-Math.floor(f); _subFrac= i>=ramp.length-1 ? 1 : 0.45+0.55*frac; _subTok++; } else { _subFrac=1; }
  return ramp[i]; }

class Grid {
  constructor(c,r){ this.cols=c; this.rows=r; this._setTok=-1; this.clear(); }
  clear(ch=' '){ const n=this.cols*this.rows; this.cells=new Array(n).fill(ch); this.col=new Array(n).fill(null); this.alpha=new Array(n).fill(1); }
  set(x,y,ch,color){ x|=0; y|=0; let a=1; if(_subTok!==this._setTok){ a=_subFrac; this._setTok=_subTok; _subFrac=1; } if(x<0||y<0||x>=this.cols||y>=this.rows)return; const i=y*this.cols+x; this.cells[i]=ch; this.col[i]=color||null; this.alpha[i]=a; }
  toHTML(){
    // Every character occupies its own 1ch grid cell. A wide glyph (block,
    // round dot) fills its cell and cannot shift neighbors. Color carried by a
    // 1-char class to keep the markup small. Empty cells are skipped (grid
    // auto-places by column via grid-column on non-blank cells only would be
    // costly, so we emit a thin spacer run instead).
    let out='';
    for(let y=0;y<this.rows;y++){
      let line='';
      for(let x=0;x<this.cols;x++){ const i=y*this.cols+x; let ch=this.cells[i];
        if(ch===' '){ line+='<i></i>'; continue; }
        if(ch==='&')ch='&amp;'; else if(ch==='<')ch='&lt;'; else if(ch==='>')ch='&gt;';
        const c=this.col[i];
        const cls = c==='var(--hud)'?'h': c==='var(--dim,var(--ink))'||c==='var(--dim)'?'d':'';
        const a=this.alpha[i];
        const sty = a<0.999 ? ' style="opacity:'+a.toFixed(2)+';--ga:'+a.toFixed(2)+'"' : '';
        line+= '<i'+(cls?' class="'+cls+'"':'')+sty+'>'+ch+'</i>';
      }
      out+='<span class="gr" style="grid-template-columns:repeat('+this.cols+',var(--cw))">'+line+'</span>';
    }
    return out;
  }
}

class Engine {
  constructor(pre,sketch,opts){ opts=opts||{};
    this.pre=pre; this.sketch=sketch;
    this.cols=(opts.cols||COLS); this.rows=(opts.rows||ROWS); this.grid=new Grid(this.cols,this.rows);
    this.fps=sketch.fps||30; this.step=1000/this.fps; this.acc=0; this.last=performance.now(); this.frame=0;
    this.running=true; this.mini=!!opts.mini; this.reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
    this.state={}; this.charMode='ascii'; this.params={zoom:1};
    (sketch.sliders||[]).forEach(s=>this.params[s.id]=s.def);
    if(sketch.setup) sketch.setup(this);
    this._loop=this._loop.bind(this); this._raf=requestAnimationFrame(this._loop);
  }
  ramp(){ if(this.charMode==='blocky')return CHARSETS.blocky; if(this.charMode==='dots')return CHARSETS.dots; return CHARSETS.ascii; }
  resize(cols,rows){ this.cols=cols; this.rows=rows; this.grid=new Grid(cols,rows); if(this.sketch.setup)this.sketch.setup(this); }
  setMode(m){ this.charMode=m; } setParam(id,v){ this.params[id]=v; }
  _loop(now){ if(this._dead)return; let dt=now-this.last; this.last=now; if(dt>250)dt=250; if(this.running)this.acc+=dt;
    const fps=Math.round(1000/Math.max(dt,1));
    while(this.acc>=this.step){ this.acc-=this.step; if(this.sketch.update)this.sketch.update(this); this.frame++; if(this.reduced)break; }
    this.grid.clear(' '); if(this.sketch.draw)this.sketch.draw(this);
    let html=this.grid.toHTML();
    this.pre.innerHTML=html; this._raf=requestAnimationFrame(this._loop); }
  destroy(){ this._dead=true; cancelAnimationFrame(this._raf); }
}

/* 35 SMOOTHLIFE — continuous Game of Life, organic blobs always evolving */
const Smooth={ name:'SmoothLife', cat:'cellular automata', fps:20,
  sliders:[{id:'radius',label:'scale',min:2,max:6,step:1,def:3},{id:'speed',label:'speed',min:4,max:30,step:1,def:16}],
  dims(e){ const z=e.params.zoom; return {C:Math.max(24,Math.round(e.cols/z)),R:Math.max(16,Math.round(e.rows/z))}; },
  setup(e){ const d=this.dims(e); e.state.C=d.C; e.state.R=d.R; const n=d.C*d.R; e.state.f=new Float32Array(n);
    for(let i=0;i<n;i++)e.state.f[i]=Math.random()<0.45?1:0; e.state.z=e.params.zoom; e.state.ra=e.params.radius; },
  update(e){ if(e.params.zoom!==e.state.z||e.params.radius!==e.state.ra)this.setup(e); e.fps=e.params.speed; e.step=1000/e.fps;
    const C=e.state.C,R=e.state.R,f=e.state.f; const ri=e.params.radius, ra=ri*3; const nf=new Float32Array(f.length);
    for(let y=0;y<R;y++)for(let x=0;x<C;x++){ let inner=0,ic=0,outer=0,oc=0;
      for(let dy=-ra;dy<=ra;dy++)for(let dx=-ra;dx<=ra;dx++){ const dist=Math.hypot(dx,dy); if(dist>ra)continue; const v=f[((y+dy+R)%R)*C+((x+dx+C)%C)];
        if(dist<=ri){ inner+=v; ic++; } else { outer+=v; oc++; } }
      const m=inner/ic, nn=outer/oc; // smoothlife transition (smoothed B/S)
      const sig=(a,b,w)=>1/(1+Math.exp(-(a-b)/w));
      const alive=sig(m,0.5,0.03);
      // birth window ~[0.20,0.26], survive window ~[0.18,0.32]
      const birth=sig(nn,0.20,0.03)*(1-sig(nn,0.26,0.03));
      const survive=sig(nn,0.18,0.03)*(1-sig(nn,0.32,0.03));
      const next=alive*survive+(1-alive)*birth; const i=y*C+x; nf[i]=clamp(f[i]+(2*next-1)*0.4,0,1); }
    e.state.f=nf; },
  draw(e){ const ramp=e.ramp(); const f=e.state.f,C=e.state.C,R=e.state.R; const sx=e.cols/C,sy=e.rows/R;
    for(let y=0;y<R;y++)for(let x=0;x<C;x++){ const v=f[y*C+x]; if(v>0.15){ const ch=shadeChar(ramp,v); const px=Math.floor(x*sx),py=Math.floor(y*sy); e.grid.set(px,py,ch,COL3(v)); } } },
  icon:" .oOo.   \n.oOOOo.  \noOO@@Oo. \nOO@@@@Oo \noO@@@@Oo.\n.oO@@Oo. \n .oOOo.  \n  .oo.   \n   ..    " };

  icon:" #-# #-# \n/|/|/|/| \n#-# #-#| \n|#|#|#|# \n#-@ @-#| \n|#|#|#|/ \n#-# #-#  \n|/|/|/   \n#-# #-#  " };

const SKETCHES=[Rotozoom,Fire,TorusField,Copper,Warp,Wormhole,Terrain,Ocean,Aurora,Liquid,Apollonian,Hilbert,Koch,Pyramid,Magnetic,Penrose,Moire,Orbit,Plinko,Sonar,Hypercube,Pipes,BlackHole,RubikSpin,Super,Lava,Smoke,RadialEq,Waveform,Mandala,Wells,Foam,Raindrops,Dragon,Neural,Collision,Cloth,CharRain,Spiral,BreatheGrid,Fireflies,Sandpile,Tentacle,CubeField,Vortex,Radar,Crystal,Turbulence,Hopalong,Supernova,Life,Flow,Donut,Rule30,Brain,Boids,Rain,Plasma,Mandel,Stars,Julia,Truchet,Perlin,Worley,Ripple,Wire,Cyclic,Ant,Sand,Lorenz,Pendulum,Wave,Bounce,Fireworks,Fountain,Snow,Slime,Cube,SphereLattice,Spiro,Newton,Icosa,SineFlow,Curl,PlasmaBloom,Swarm,Rose,Harmono,Spectrum,Scope,Knot,Tunnel,Meta,Kaleido,Phyllo,HighLife,Voronoi,Chladni,Galaxy,DLA];

const grid100=document.getElementById('grid100');
const pager=document.getElementById('pager');
let hoverEngine=null, hoverPre=null;
function stopHover(){ if(hoverEngine){ hoverEngine.destroy(); hoverEngine=null; } if(hoverPre){ hoverPre.textContent=hoverPre._icon; hoverPre=null; } }

const PER_PAGE=50, PAGES=Math.ceil(100/PER_PAGE);
let curPage=0;

function makeTile(i){ const sk=SKETCHES[i]; const tile=document.createElement(sk?'button':'div');
  tile.className='tile'+(sk?'':' empty'); tile.innerHTML='<span class="num">'+String(i+1).padStart(2,'0')+'</span>';
  if(sk){
    const pre=document.createElement('pre'); pre._icon=sk.icon; pre.textContent=sk.icon; tile.appendChild(pre);
    const lbl=document.createElement('span'); lbl.className='lbl'; lbl.textContent=sk.name; tile.appendChild(lbl);
    tile.addEventListener('mouseenter',()=>{ stopHover(); hoverPre=pre; const eng=new Engine(pre,sk,{mini:true,cols:18,rows:12}); eng.fps=Math.min(eng.fps,14); eng.step=1000/eng.fps; hoverEngine=eng; });
    tile.addEventListener('mouseleave',stopHover);
    tile.addEventListener('click',()=>{ stopHover(); openInner(sk); });
  }
  return tile;
}

function renderPage(p){ stopHover(); curPage=clamp(p,0,PAGES-1); grid100.innerHTML='';
  const start=curPage*PER_PAGE;
  for(let i=start;i<start+PER_PAGE && i<100;i++) grid100.appendChild(makeTile(i));
  renderPager();
}
function renderPager(){ pager.innerHTML='';
  const prev=document.createElement('button'); prev.className='iconbtn'; prev.innerHTML='&#9665; <span class="btn-label">prev</span>'; prev.title='previous page'; prev.setAttribute('aria-label','previous page'); prev.disabled=curPage===0;
  prev.onclick=()=>{ if(curPage>0) renderPage(curPage-1); }; pager.appendChild(prev);
  const rand=document.createElement('button'); rand.className='iconbtn'; rand.innerHTML='&#10042; <span class="btn-label">random</span>'; rand.title='random sim'; rand.setAttribute('aria-label','random sim');
  rand.onclick=()=>{ stopHover(); openInner(SKETCHES[Math.floor(Math.random()*SKETCHES.length)]); }; pager.appendChild(rand);
  const next=document.createElement('button'); next.className='iconbtn'; next.innerHTML='<span class="btn-label">next</span> &#9655;'; next.title='next page'; next.setAttribute('aria-label','next page'); next.disabled=curPage===PAGES-1;
  next.onclick=()=>{ if(curPage<PAGES-1) renderPage(curPage+1); }; pager.appendChild(next);
}
renderPage(0);

const landing=document.getElementById('landing'), inner=document.getElementById('inner'), gridPre=document.getElementById('grid');
const innerName=document.getElementById('innerName'), innerCat=document.getElementById('innerCat'), innerIco=document.getElementById('innerIco');
const tuneCol1=document.getElementById('tuneCol1'), tuneCol2=document.getElementById('tuneCol2'), zoomCol=document.getElementById('zoomCol');
let activeEngine=null, activeSketch=null, activeIdx=-1;

const ZOOM_SLIDER={id:'zoom',label:'zoom',min:0.4,max:2.5,step:0.05,def:1};

function makeSlider(col, s){
  col.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='slider-row';
  wrap.innerHTML=
    '<div class="srow-top"><label>'+s.label+'</label><span class="val">'+s.def+'</span></div>'+
    '<div class="srow-bot"><input type="range" min="'+s.min+'" max="'+s.max+'" step="'+s.step+'" value="'+s.def+'"></div>';
  const input=wrap.querySelector('input'), val=wrap.querySelector('.val');
  input.addEventListener('input',()=>{ val.textContent=input.value; activeEngine.setParam(s.id,parseFloat(input.value)); });
  col.appendChild(wrap);
}

function buildSliders(sk){
  const s=sk.sliders||[];
  if(s[0]) makeSlider(tuneCol1, s[0]); else tuneCol1.innerHTML='';
  if(s[1]) makeSlider(tuneCol2, s[1]); else tuneCol2.innerHTML='';
  makeSlider(zoomCol, ZOOM_SLIDER);      // universal, always present
}

function openInner(sk,mode){ mode=mode||'ascii'; activeSketch=sk; activeIdx=SKETCHES.indexOf(sk); innerName.textContent=sk.name; innerCat.textContent=sk.cat; innerIco.textContent=sk.icon;
  landing.style.display='none'; inner.classList.add('show'); document.body.classList.add('inner-open'); if(activeEngine)activeEngine.destroy(); activeEngine=new Engine(gridPre,sk,{}); activeEngine.setMode(mode); buildSliders(sk);
  document.querySelectorAll('#charsetModes button').forEach(b=>b.classList.toggle('active',b.dataset.m===mode));
  requestAnimationFrame(fitWindowed); gridPre.focus(); }
function closeInner(){ if(activeEngine){activeEngine.destroy(); activeEngine=null;} inner.classList.remove('show','fs'); document.body.classList.remove('inner-open'); landing.style.display=''; }
function stepInner(d){ if(activeIdx<0)return; const n=(activeIdx+d+SKETCHES.length)%SKETCHES.length; const fs=inner.classList.contains('fs'); const mode=activeEngine?activeEngine.charMode:'ascii'; openInner(SKETCHES[n],mode); if(fs){ inner.classList.add('fs'); if(activeEngine)activeEngine.hideHud=true; requestAnimationFrame(fitFs); } }
function randomInner(){ if(activeIdx<0)return; let n=activeIdx; if(SKETCHES.length>1){ while(n===activeIdx) n=Math.floor(Math.random()*SKETCHES.length); } const fs=inner.classList.contains('fs'); const mode=activeEngine?activeEngine.charMode:'ascii'; openInner(SKETCHES[n],mode); if(fs){ inner.classList.add('fs'); if(activeEngine)activeEngine.hideHud=true; requestAnimationFrame(fitFs); } }

document.getElementById('backBtn').onclick=closeInner;
document.getElementById('fsBtn').onclick=enterFs;
document.getElementById('fsExit').onclick=exitFs;
document.getElementById('prevBtn').onclick=()=>stepInner(-1);
document.getElementById('randBtn').onclick=randomInner;
document.getElementById('nextBtn').onclick=()=>stepInner(1);

function measureCell(fontPx){
  const probe=document.createElement('pre');
  probe.style.cssText='position:absolute;left:-9999px;top:0;visibility:hidden;margin:0;padding:0;font-family:var(--font);white-space:pre;font-size:'+fontPx+'px;line-height:'+(fontPx*1.08)+'px;';
  let txt=''; for(let i=0;i<100;i++)txt+='M'; for(let i=0;i<20;i++)txt+='\nM';
  probe.textContent=txt;
  document.body.appendChild(probe);
  const r=probe.getBoundingClientRect();
  const w=r.width/100, h=r.height/21;
  probe.remove();
  return {w,h};
}

function enterFs(){
  if(!activeEngine) return;
  inner.classList.add('fs');
  activeEngine.hideHud=true;
  fitFs();
  gridPre.focus();
}
function fitFs(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const fontPx=20;                     // matches windowed baked-in size
  const {h}=measureCell(fontPx);
  const cw=h;                          // square cells: width = row height
  const cols=Math.ceil(vw/cw)+1;       // +1 and ceil so the right/bottom edge is covered
  const rows=Math.ceil(vh/h)+1;
  document.documentElement.style.setProperty('--fs-size',fontPx+'px');
  document.documentElement.style.setProperty('--fs-line',h.toFixed(3)+'px');
  activeEngine.resize(cols,rows);
}
function exitFs(){
  inner.classList.remove('fs');
  if(activeEngine){ activeEngine.hideHud=false; fitWindowed(); }
}
function fitWindowed(){
  if(!activeEngine || inner.classList.contains('fs')) return;
  const stage=document.querySelector('.stage');
  const head=document.querySelector('.inner-head');
  const controls=document.querySelector('.controls');
  const wrap=document.querySelector('.inner-wrap');
  const sc=getComputedStyle(stage), wc=getComputedStyle(wrap);
  const padX=parseFloat(sc.paddingLeft)+parseFloat(sc.paddingRight);
  const padY=parseFloat(sc.paddingTop)+parseFloat(sc.paddingBottom);
  const wrapPadY=parseFloat(wc.paddingTop)+parseFloat(wc.paddingBottom);
  const fontPx=20;                     // baked-in ~1.5x (was 13) to match the 150% look
  const {h}=measureCell(fontPx);
  const cw=h;                          // square cells: width = row height

  const availW=stage.clientWidth - padX;
  // vertical budget: viewport minus header, controls, wrap padding, stage padding, borders
  const used = head.offsetHeight + controls.offsetHeight + wrapPadY + padY + 12;
  const availH = window.innerHeight - used;

  const cols=Math.max(24, Math.floor(availW/cw));
  const rows=Math.max(12, Math.floor(availH/h));   // fill the height that's actually left
  document.documentElement.style.setProperty('--fs-size','20px');
  document.documentElement.style.setProperty('--fs-line',h.toFixed(3)+'px');
  activeEngine.resize(cols,rows);
}
document.querySelectorAll('#charsetModes button').forEach(b=>{ b.onclick=()=>{ document.querySelectorAll('#charsetModes button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); activeEngine.setMode(b.dataset.m); }; });
gridPre.addEventListener('keydown',e=>{ if(!activeEngine)return; if(e.key===' '){activeEngine.running=!activeEngine.running; e.preventDefault();} if(e.key==='r'||e.key==='R'){ if(activeSketch.setup)activeSketch.setup(activeEngine);} if(e.key==='Escape'&&inner.classList.contains('fs'))exitFs(); });
window.addEventListener('resize',()=>{ if(!inner.classList.contains('show'))return; if(inner.classList.contains('fs'))fitFs(); else fitWindowed(); });

document.querySelectorAll('#themes button').forEach(b=>{ b.onclick=()=>{ document.documentElement.setAttribute('data-theme',b.dataset.t); document.querySelectorAll('#themes button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }; });
document.documentElement.setAttribute('data-theme','green');
</script>
</body>
</html>
